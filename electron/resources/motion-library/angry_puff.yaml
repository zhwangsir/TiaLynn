id: angry_puff
display_name_zh: 生气鼓脸
duration: 2.5
loop: false
fps: 30
tags: [reaction, expression]
description: 头侧 + 嘴撅 + 眉毛皱起 + 脸颊鼓起，可爱版生气
emotions: [angry, tease]
contexts: [conversation_reply, reaction]
intensity: normal
required_semantics: [mouth_form]
recommended_semantics: [head_yaw, brow_left_y, brow_right_y, cheek]
tracks:
  - semantic: head_yaw
    importance: 0.6
    easing: ease-out
    keyframes:
      - { t: 0,   v: 0 }
      - { t: 0.6, v: -10 }
      - { t: 2.5, v: -8 }
  - semantic: mouth_form
    importance: 1.0
    easing: ease-in-out
    keyframes:
      - { t: 0,   v: 0 }
      - { t: 0.5, v: -0.8 }
      - { t: 2.5, v: -0.6 }
  - semantic: brow_left_y
    importance: 0.7
    keyframes:
      - { t: 0,   v: 0 }
      - { t: 0.5, v: -0.6 }
      - { t: 2.5, v: -0.4 }
  - semantic: brow_right_y
    importance: 0.7
    keyframes:
      - { t: 0,   v: 0 }
      - { t: 0.5, v: -0.6 }
      - { t: 2.5, v: -0.4 }
  - semantic: cheek
    importance: 0.5
    keyframes:
      - { t: 0,   v: 0 }
      - { t: 0.6, v: 0.7 }
      - { t: 2.5, v: 0.5 }
  - semantic: brow_form
    importance: 0.5
    keyframes:
      - { t: 0,   v: 0 }
      - { t: 0.5, v: -0.8 }
      - { t: 2.5, v: -0.6 }
