id: happy_excited
display_name_zh: 兴奋雀跃
duration: 2.5
loop: false
fps: 30
tags: [reaction, energetic, expression]
description: 头部上扬 + 眼睛笑起来 + 嘴张开，表达开心/兴奋的反应
emotions: [happy]
contexts: [conversation_reply, task_done, reaction]
intensity: strong
required_semantics: [head_pitch, mouth_open]
recommended_semantics: [eye_left_open, eye_right_open, brow_left_y, brow_right_y]
tracks:
  - semantic: head_pitch
    importance: 0.8
    easing: ease-in-out
    keyframes:
      - { t: 0,   v: 0 }
      - { t: 0.6, v: 8 }
      - { t: 1.2, v: 5 }
      - { t: 2.0, v: 6 }
      - { t: 2.5, v: 0 }
  - semantic: mouth_open
    importance: 1.0
    easing: ease-in-out
    keyframes:
      - { t: 0,   v: 0 }
      - { t: 0.5, v: 0.8 }
      - { t: 1.0, v: 0.5 }
      - { t: 1.5, v: 0.7 }
      - { t: 2.5, v: 0.2 }
  - semantic: mouth_smile
    importance: 0.6
    keyframes:
      - { t: 0,   v: 0 }
      - { t: 0.5, v: 1.0 }
      - { t: 2.5, v: 0.6 }
  - semantic: eye_smile
    importance: 0.5
    keyframes:
      - { t: 0,   v: 0 }
      - { t: 0.5, v: 1.0 }
      - { t: 2.5, v: 0.5 }
  - semantic: brow_left_y
    importance: 0.3
    keyframes:
      - { t: 0,   v: 0 }
      - { t: 0.5, v: 0.6 }
      - { t: 2.5, v: 0.3 }
  - semantic: brow_right_y
    importance: 0.3
    keyframes:
      - { t: 0,   v: 0 }
      - { t: 0.5, v: 0.6 }
      - { t: 2.5, v: 0.3 }
